apiVersion: apps/v1
kind: Deployment
metadata:
  name: wix-hubspot-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wix-hubspot-api
  template:
    metadata:
      labels:
        app: wix-hubspot-api
    spec:
      containers:
        - name: api
          image: ghcr.io/ibranerd/wix-hubspot-api:latest
          ports:
            - containerPort: 8080
          env:
            - name: API_PORT
              value: '8080'
            - name: APP_BASE_URL
              value: 'https://api.example.com'
            - name: DATA_DIR
              value: '/var/lib/wix-hubspot'
            - name: HUBSPOT_USE_MOCK_OAUTH
              value: 'false'
          volumeMounts:
            - name: runtime-data
              mountPath: /var/lib/wix-hubspot
      volumes:
        - name: runtime-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: wix-hubspot-api
spec:
  selector:
    app: wix-hubspot-api
  ports:
    - name: http
      port: 80
      targetPort: 8080
