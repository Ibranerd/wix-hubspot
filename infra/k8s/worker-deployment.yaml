apiVersion: apps/v1
kind: Deployment
metadata:
  name: wix-hubspot-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wix-hubspot-worker
  template:
    metadata:
      labels:
        app: wix-hubspot-worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/ibranerd/wix-hubspot-worker:latest
          env:
            - name: DATA_DIR
              value: '/var/lib/wix-hubspot'
            - name: WORKER_POLL_MS
              value: '2000'
            - name: WORKER_BATCH_SIZE
              value: '20'
            - name: HUBSPOT_USE_MOCK_OAUTH
              value: 'false'
          volumeMounts:
            - name: runtime-data
              mountPath: /var/lib/wix-hubspot
      volumes:
        - name: runtime-data
          emptyDir: {}
